<!DOCTYPE html>
<html>
<head>
    <title>Contigo — Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #042C53; color: white; font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 30px; background-color: #0C447C; border-bottom: 1px solid #185FA5; }
        .listener-info { display: flex; align-items: center; gap: 14px; }
        .avatar { width: 44px; height: 44px; border-radius: 50%; background-color: #185FA5; display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 20px; }
        .listener-name { font-size: 16px; font-weight: 500; }
        .listener-status { font-size: 12px; color: #1D9E75; margin-top: 2px; }
        .timer { font-size: 14px; color: #85B7EB; background-color: #042C53; padding: 8px 20px; border-radius: 20px; }
        .end-btn { background-color: transparent; color: #85B7EB; border: 1px solid #185FA5; padding: 8px 20px; border-radius: 20px; font-size: 13px; cursor: pointer; font-family: 'Inter', sans-serif; }
        .end-btn:hover { background-color: #0C447C; color: white; }
        .chat-area { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 16px; }
        .message { display: flex; flex-direction: column; max-width: 65%; }
        .message.user { align-self: flex-end; align-items: flex-end; }
        .message.listener { align-self: flex-start; align-items: flex-start; }
        .bubble { padding: 14px 18px; border-radius: 18px; font-size: 15px; line-height: 1.6; }
        .message.user .bubble { background-color: #185FA5; color: white; border-bottom-right-radius: 4px; }
        .message.listener .bubble { background-color: #0C447C; color: white; border-bottom-left-radius: 4px; }
        .message-time { font-size: 11px; color: #378ADD; margin-top: 4px; opacity: 0.7; }
        .safety-bar { text-align: center; padding: 8px; background-color: #021A33; font-size: 11px; color: #85B7EB; }
        .safety-bar span { color: white; font-weight: bold; }
        .input-area { padding: 20px 30px; background-color: #0C447C; border-top: 1px solid #185FA5; display: flex; gap: 12px; align-items: center; }
        .message-input { flex: 1; padding: 14px 20px; background-color: #042C53; border: 1px solid #185FA5; border-radius: 30px; color: white; font-size: 15px; font-family: 'Inter', sans-serif; outline: none; }
        .message-input:focus { border-color: #378ADD; }
        .message-input::placeholder { color: #378ADD; opacity: 0.5; }
        .send-btn { width: 48px; height: 48px; background-color: #185FA5; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: background-color 0.3s ease; }
        .send-btn:hover { background-color: #378ADD; }
        .role-badge { font-size: 11px; color: #85B7EB; background-color: #042C53; padding: 4px 12px; border-radius: 10px; margin-left: 8px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
</head>
<body>

    <div class="topbar">
        <div class="listener-info">
            <div class="avatar" id="topbar-avatar">?</div>
            <div>
                <div class="listener-name" id="topbar-name">Connecting...</div>
                <div class="listener-status" id="topbar-status">● Online</div>
            </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
            <div class="timer" id="timer">45:00</div>
            <div class="role-badge" id="role-badge" style="display:none"></div>
        </div>
        <button class="end-btn" onclick="endSession()">End Session</button>
    </div>

    <div class="chat-area" id="chat-area"></div>

    <div class="safety-bar">
        In crisis? Reach out now — <span>iCall: 9152987821</span>
    </div>

    <div class="input-area">
        <input type="text" class="message-input" id="message-input" placeholder="Type your message...">
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>

    <script>
        let currentUser = null
        let sessionId = null
        let seconds = 45 * 60

        const isListener = sessionStorage.getItem('contigo_is_listener') === 'true'
        const chatUserName = sessionStorage.getItem('contigo_chat_user') || 'User'

        // Safe parse of listener info — avoids null style bug
        let listenerInfo = { name: 'Aanya', letter: 'A', style: 'Patient Listener', id: null }
        try {
            const stored = sessionStorage.getItem('contigo_listener')
            if (stored) {
                const parsed = JSON.parse(stored)
                listenerInfo = {
                    name: parsed.name || 'Aanya',
                    letter: parsed.letter || 'A',
                    style: parsed.style || 'Patient Listener',
                    id: parsed.id || null
                }
            }
        } catch(e) {}

        // Set topbar based on role
        if (isListener) {
            document.getElementById('topbar-name').textContent = chatUserName
            document.getElementById('topbar-avatar').textContent = chatUserName.charAt(0).toUpperCase()
            document.getElementById('topbar-status').textContent = '● Connected'
            const badge = document.getElementById('role-badge')
            badge.style.display = 'block'
            badge.textContent = 'You are listening'
        } else {
            document.getElementById('topbar-name').textContent = listenerInfo.name
            document.getElementById('topbar-avatar').textContent = listenerInfo.letter
            document.getElementById('topbar-status').textContent = '● Online — ' + listenerInfo.style
        }

        // Timer
        function updateTimer() {
            const mins = Math.floor(seconds / 60)
            const secs = seconds % 60
            document.getElementById('timer').textContent =
                String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0')
            if (seconds > 0) seconds--
        }
        setInterval(updateTimer, 1000)

        window.addEventListener('load', async () => {
            currentUser = await requireAuth()
            if (!currentUser) return

            if (isListener) {
                // Listener: session already set by dashboard
                sessionId = sessionStorage.getItem('contigo_session_id')
                if (!sessionId) {
                    window.location.href = 'dashboard.html'
                    return
                }
            } else {
                // User: get or create session
                await getOrCreateSession()
            }

            await loadMessages()
            subscribeToMessages()
        })

        async function getOrCreateSession() {
            // Check sessionStorage first
            sessionId = sessionStorage.getItem('contigo_session_id')
            if (sessionId) return

            // Try to find existing active session for this user
            const { data: existing } = await supabase
                .from('sessions')
                .select('id')
                .eq('user_id', currentUser.id)
                .eq('is_active', true)
                .order('started_at', { ascending: false })
                .limit(1)
                .single()

            if (existing) {
                sessionId = existing.id
                sessionStorage.setItem('contigo_session_id', sessionId)
                return
            }

            // No existing session — create a fresh one with no listener
            const { data, error } = await supabase
                .from('sessions')
                .insert({
                    user_id: currentUser.id,
                    listener_id: null,
                    is_active: true
                })
                .select()
                .single()

            if (data) {
                sessionId = data.id
                sessionStorage.setItem('contigo_session_id', sessionId)
            } else {
                console.error('Session error:', error)
            }
        }

        async function loadMessages() {
            if (!sessionId) return

            const { data } = await supabase
                .from('messages')
                .select('*')
                .eq('session_id', sessionId)
                .order('sent_at', { ascending: true })

            if (data && data.length > 0) {
                data.forEach(msg => displayMessage(msg, false))
            } else {
                if (isListener) {
                    showSystemMessage("You've joined this session. Say hello 💙")
                } else {
                    showWelcomeMessage()
                }
            }
        }

        function showWelcomeMessage() {
            const chatArea = document.getElementById('chat-area')
            const div = document.createElement('div')
            div.className = 'message listener'
            div.innerHTML = `
                <div class="bubble">Hey, I'm really glad you reached out. Take your time — I'm here and I'm listening. 💙</div>
                <div class="message-time">just now</div>
            `
            chatArea.appendChild(div)
        }

        function showSystemMessage(text) {
            const chatArea = document.getElementById('chat-area')
            const div = document.createElement('div')
            div.style.cssText = 'text-align:center;font-size:12px;color:#85B7EB;padding:10px 0'
            div.textContent = text
            chatArea.appendChild(div)
        }

        function subscribeToMessages() {
            supabase
                .channel('messages_' + sessionId)
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'messages',
                    filter: `session_id=eq.${sessionId}`
                }, payload => {
                    if (payload.new.sender_id !== currentUser.id) {
                        displayMessage(payload.new, true)
                    }
                })
                .subscribe()
        }

        async function sendMessage() {
            const input = document.getElementById('message-input')
            const text = input.value.trim()
            if (!text) return

            if (!sessionId) {
                alert('Still connecting, please wait a moment...')
                return
            }

            const fakeMsg = {
                content: text,
                sender_id: currentUser.id,
                sent_at: new Date().toISOString()
            }
            displayMessage(fakeMsg, false)
            input.value = ''

            const { error } = await supabase.from('messages').insert({
                session_id: sessionId,
                sender_id: currentUser.id,
                content: text
            })
            if (error) console.error('Send error:', error)
        }

        function displayMessage(msg, scroll) {
            const isMe = msg.sender_id === currentUser?.id
            const chatArea = document.getElementById('chat-area')
            const time = new Date(msg.sent_at)
            const timeStr = time.getHours() + ':' + String(time.getMinutes()).padStart(2, '0')
            const div = document.createElement('div')
            div.className = 'message ' + (isMe ? 'user' : 'listener')
            div.innerHTML = `
                <div class="bubble">${msg.content}</div>
                <div class="message-time">${timeStr}</div>
            `
            chatArea.appendChild(div)
            chatArea.scrollTop = chatArea.scrollHeight
        }

        async function endSession() {
            if (sessionId) {
                await supabase
                    .from('sessions')
                    .update({ is_active: false, ends_at: new Date().toISOString() })
                    .eq('id', sessionId)
            }
            sessionStorage.removeItem('contigo_session_id')
            sessionStorage.removeItem('contigo_is_listener')
            sessionStorage.removeItem('contigo_chat_user')
            window.location.href = isListener ? 'dashboard.html' : 'index.html'
        }

        document.getElementById('message-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage()
        })
    </script>

</body>
</html>
